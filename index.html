<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>한공부 · 韓語學習</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B4F9C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="한공부">
<link rel="apple-touch-icon" href="/korean-study/icon-192.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg: #EEF4FC;
  --surface: #FFFFFF;
  --border: #C6DAF2;
  --text: #0C2340;
  --text2: #24446B;
  --muted: #7591B3;
  --accent: #1B4F9C;
  --accent-soft: #E1EBFA;
  --blue: #1471C4;
  --blue-soft: #E1EFFC;
  --green: #1E6E4A;
  --green-soft: #E6F2EC;
  --red-soft: #FFF0EE;
  --r: 16px;
  --rs: 10px;
  --nav-h: 72px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans TC', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: var(--nav-h);
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  background: var(--accent);
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-kr { font-family: 'Noto Sans KR'; font-size: 25px; font-weight: 800; color: white; }
.logo-zh { font-size: 16px; color: rgba(255,255,255,0.75); margin-left: 8px; }
.header-right { display: flex; gap: 10px; align-items: center; }
.hdr-btn {
  background: rgba(255,255,255,0.2);
  border: none; border-radius: 20px;
  color: white; font-size: 17px; font-weight: 700;
  padding: 6px 14px; cursor: pointer; font-family: inherit;
}
.stat-badge {
  background: rgba(255,255,255,0.25);
  border-radius: 12px;
  padding: 4px 10px;
  font-size: 16px; color: white; font-weight: 800;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; cursor: pointer;
  border: none; background: none;
  color: var(--muted); font-family: inherit;
  transition: color 0.15s;
  padding: 8px 4px;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 28px; line-height: 1; }
.nav-label { font-size: 14px; font-weight: 800; }

/* ── MAIN ── */
main { padding: 20px 16px; max-width: 600px; margin: 0 auto; }

/* ── SECTIONS ── */
.section { display: none; }
.section.active { display: block; }

/* ── PAGE TITLE ── */
.page-title {
  font-size: 16px; font-weight: 800;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 18px;
}

/* ── SCAN ── */
.upload-box {
  background: var(--surface);
  border: 2px dashed var(--border);
  border-radius: var(--r);
  padding: 36px 20px;
  text-align: center;
  margin-bottom: 14px;
}
.upload-box .icon { font-size: 57px; margin-bottom: 10px; }
.upload-box h2 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
.upload-box p { color: var(--text2); font-size: 20px; line-height: 1.6; }

.btn-row { display: flex; gap: 12px; margin-bottom: 14px; }
.btn-primary {
  flex: 1; padding: 16px; border: none; border-radius: var(--r);
  background: var(--accent); color: white;
  font-size: 22px; font-weight: 800; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-secondary {
  flex: 1; padding: 16px; border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); color: var(--text);
  font-size: 22px; font-weight: 800; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-green {
  width: 100%; padding: 16px; border: none; border-radius: var(--r);
  background: var(--green); color: white;
  font-size: 22px; font-weight: 800; cursor: pointer; font-family: inherit;
  margin-top: 14px;
}

.preview-img {
  width: 100%; max-height: 300px; object-fit: contain;
  border-radius: var(--r); border: 1px solid var(--border);
  margin-bottom: 12px;
}
.analyze-btn {
  width: 100%; padding: 18px; border: none; border-radius: var(--r);
  background: var(--accent); color: white;
  font-size: 24px; font-weight: 800; cursor: pointer; font-family: inherit;
}
.analyze-btn:disabled { opacity: 0.5; }

/* loading */
.loading { display: none; text-align: center; padding: 40px 20px; }
.loading.show { display: block; }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 21px; color: var(--text2); }

/* result */
.result-box { display: none; }
.result-box.show { display: block; }
.result-card {
  background: var(--surface); border-radius: var(--r);
  border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden;
}
.result-card-header {
  padding: 14px 18px; background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 19px; font-weight: 800; color: var(--text2);
}
.result-card-body { padding: 14px 18px; }

/* vocab row in result */
.vrow {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.vrow:last-child { border-bottom: none; }
.vrow-kr { font-family: 'Noto Sans KR'; font-size: 25px; font-weight: 800; min-width: 90px; }
.vrow-rom { font-size: 17px; color: var(--muted); min-width: 80px; }
.vrow-zh { font-size: 21px; flex: 1; }
.vrow-en { font-size: 16px; color: var(--muted); font-style: italic; margin-top: 2px; }
.tts-btn { background: none; border: none; font-size: 25px; cursor: pointer; padding: 4px; }

/* ── CARDS ── */
.filter-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.filter-chip {
  padding: 8px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 19px; cursor: pointer; font-family: inherit; color: var(--text2);
  font-weight: 700;
}
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

.card-counter { text-align: center; font-size: 20px; color: var(--muted); margin-bottom: 12px; }

.card-scene {
  width: 100%; height: 260px;
  perspective: 1000px; cursor: pointer; margin-bottom: 18px;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  background: var(--surface); border-radius: var(--r);
  border: 1px solid var(--border);
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px; text-align: center; gap: 12px;
}
.card-face.back { transform: rotateY(180deg); background: var(--accent-soft); }
.card-label { font-size: 16px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.card-kr { font-family: 'Noto Sans KR'; font-size: 57px; font-weight: 800; line-height: 1.1; }
.card-rom { font-size: 22px; color: var(--text2); }
.card-zh { font-size: 35px; font-weight: 800; color: var(--accent); }
.card-en { font-size: 19px; color: var(--text2); font-style: italic; }
.card-tap { font-size: 19px; color: var(--muted); }

.card-btns { display: flex; gap: 12px; }
.card-btn {
  flex: 1; padding: 16px 8px; border-radius: var(--r);
  border: 1.5px solid var(--border); background: var(--surface);
  font-size: 20px; font-weight: 800; cursor: pointer; font-family: inherit;
}
.card-btn.again { border-color: var(--accent); color: var(--accent); }
.card-btn.speak { border-color: var(--blue); color: var(--blue); }
.card-btn.good { border-color: var(--green); color: var(--green); }

/* ── FILL ── */
.fill-card {
  background: var(--surface); border-radius: var(--r);
  border: 1px solid var(--border); padding: 22px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.fill-q { font-size: 24px; line-height: 2; margin-bottom: 12px; }
.fill-input {
  display: inline-block; min-width: 90px;
  border: none; border-bottom: 3px solid var(--accent);
  font-size: 25px; font-family: 'Noto Sans KR', sans-serif;
  font-weight: 800; color: var(--accent); background: transparent;
  outline: none; text-align: center; padding: 2px 6px;
  vertical-align: middle;
}
.fill-input.correct { border-color: var(--green); color: var(--green); }
.fill-input.wrong { border-color: #C62828; color: #C62828; }
.fill-hint { font-size: 20px; color: var(--muted); margin-bottom: 4px; }
.fill-hint-en { font-size: 16px; color: var(--muted); font-style: italic; margin-bottom: 12px; }
.fill-reveal { font-size: 20px; color: var(--text2); display: none; margin-bottom: 10px; }
.fill-reveal.show { display: block; }
.confirm-btn {
  padding: 12px 28px; background: var(--accent); color: white;
  border: none; border-radius: var(--rs); font-size: 21px;
  font-weight: 800; cursor: pointer; font-family: inherit;
}

/* ── PRON ── */
.pron-card {
  background: var(--surface); border-radius: var(--r);
  border: 1px solid var(--border); padding: 20px;
  margin-bottom: 12px; display: flex; align-items: center; gap: 16px;
}
.pron-kr { font-family: 'Noto Sans KR'; font-size: 37px; font-weight: 800; min-width: 110px; }
.pron-info { flex: 1; }
.pron-rom { font-size: 19px; color: var(--muted); }
.pron-zh { font-size: 24px; font-weight: 700; }
.pron-en { font-size: 17px; color: var(--muted); font-style: italic; margin-top: 2px; }
.pron-play {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--blue); color: white; border: none;
  font-size: 25px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── GRAMMAR ── */
.grammar-card {
  background: var(--surface); border-radius: var(--r);
  border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden;
}
.grammar-hdr {
  padding: 18px 20px; background: var(--blue-soft);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; cursor: pointer; gap: 12px;
}
.grammar-hdr-text { flex: 1; }
.grammar-name { font-size: 23px; font-weight: 800; }
.grammar-kr-form { font-family: 'Noto Sans KR'; font-size: 25px; color: var(--blue); margin-top: 2px; }
.grammar-body { padding: 18px 20px; display: none; }
.grammar-body.open { display: block; }
.grammar-pattern {
  font-family: 'Noto Sans KR'; background: var(--bg);
  padding: 12px 16px; border-radius: var(--rs);
  font-size: 22px; color: var(--blue); font-weight: 800; margin-bottom: 14px;
}
.grammar-ex { list-style: none; }
.grammar-ex li { padding: 10px 0; border-bottom: 1px solid var(--border); }
.grammar-ex li:last-child { border-bottom: none; }
.grammar-ex-kr { font-family: 'Noto Sans KR'; font-size: 24px; margin-bottom: 4px; }
.grammar-ex-zh { font-size: 20px; color: var(--text2); }
.grammar-ex-en { font-size: 16px; color: var(--muted); font-style: italic; margin-top: 2px; }

/* ── QUIZ ── */
.quiz-meta { display: flex; justify-content: space-between; margin-bottom: 12px; }
.quiz-meta span { font-size: 21px; color: var(--text2); font-weight: 800; }
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 22px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.quiz-word-card {
  background: var(--surface); border-radius: var(--r);
  border: 1px solid var(--border); padding: 36px 24px;
  text-align: center; margin-bottom: 18px;
}
.quiz-prompt { font-size: 21px; color: var(--text2); margin-bottom: 14px; }
.quiz-word { font-family: 'Noto Sans KR'; font-size: 62px; font-weight: 800; }
.quiz-rom { font-size: 21px; color: var(--muted); margin-top: 8px; }
.quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.quiz-opt {
  padding: 18px 12px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: var(--r);
  font-size: 22px; cursor: pointer; font-family: inherit;
  text-align: center; line-height: 1.4; font-weight: 700;
}
.quiz-opt:disabled { cursor: default; }
.quiz-opt.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); font-weight: 800; }
.quiz-opt.wrong { background: var(--red-soft); border-color: #C62828; color: #C62828; }

.score-card {
  background: var(--surface); border-radius: var(--r);
  border: 1px solid var(--border); padding: 48px 24px; text-align: center;
}
.score-num { font-size: 88px; font-weight: 800; color: var(--accent); }
.score-label { font-size: 24px; color: var(--text2); margin-top: 8px; }
.retry-btn {
  margin-top: 24px; padding: 16px 40px;
  background: var(--accent); color: white; border: none;
  border-radius: var(--r); font-size: 22px; font-weight: 800;
  cursor: pointer; font-family: inherit;
}

/* ── EMPTY ── */
.empty {
  text-align: center; padding: 60px 24px;
}
.empty .eicon { font-size: 62px; margin-bottom: 14px; }
.empty h3 { font-size: 24px; font-weight: 800; color: var(--text2); margin-bottom: 8px; }
.empty p { font-size: 21px; color: var(--muted); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #0C2340; color: white;
  padding: 12px 24px; border-radius: 24px;
  font-size: 18px; z-index: 999; transition: transform 0.25s;
  white-space: normal; font-weight: 700; text-align: center;
  max-width: 88vw; box-sizing: border-box;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── LIBRARY HEADER ── */
.lib-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.lib-count { font-size: 20px; color: var(--text2); font-weight: 800; }
.lib-clear {
  padding: 6px 14px; border: 1px solid #C62828; border-radius: 20px;
  background: none; color: #C62828; font-size: 17px; cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>

<header>
  <div>
    <span class="logo-kr">한공부</span>
    <span class="logo-zh">韓語學習</span>
  </div>
  <div class="header-right">
    <span class="stat-badge" id="totalBadge">0 個單字</span>
    <button class="hdr-btn" onclick="showApiSettings()">⚙️</button>
  </div>
</header>

<main>
  <!-- ── 掃描 ── -->
  <div class="section active" id="sec-scan">
    <div class="page-title">📸 掃描書頁</div>
    <div class="upload-box" id="uploadBox">
      <div class="icon">📖</div>
      <h2>上傳書頁照片</h2>
      <p>AI 自動識別單字、文法和例句</p>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="document.getElementById('camInput').click()">📷 拍照</button>
      <button class="btn-secondary" onclick="document.getElementById('galInput').click()">🖼️ 圖庫</button>
    </div>
    <input type="file" accept="image/*" capture="environment" id="camInput" onchange="handleFile(event)" style="display:none">
    <input type="file" accept="image/*" id="galInput" onchange="handleFile(event)" style="display:none">

    <div id="previewArea" style="display:none">
      <img id="previewImg" class="preview-img">
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">🤖 分析書頁內容</button>
    </div>

    <div class="loading" id="loadingDiv">
      <div class="spinner"></div>
      <p>AI 正在識別書頁內容……</p>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-card" id="resVocab" style="display:none">
        <div class="result-card-header">📚 識別到的單字</div>
        <div class="result-card-body" id="resVocabBody"></div>
      </div>
      <div class="result-card" id="resNotes" style="display:none">
        <div class="result-card-header">📝 文法要點</div>
        <div class="result-card-body" id="resNotesBody" style="font-size:16px;line-height:1.9;color:var(--text2);white-space:pre-wrap"></div>
      </div>
      <div class="result-card" id="resSentences" style="display:none">
        <div class="result-card-header">💬 例句</div>
        <div class="result-card-body" id="resSentBody"></div>
      </div>
      <button class="btn-green" onclick="saveAll()">✅ 加入學習庫</button>
    </div>
  </div>

  <!-- ── 單字卡 ── -->
  <div class="section" id="sec-cards">
    <div class="lib-header">
      <div class="page-title" style="margin:0">🃏 單字卡</div>
      <span class="lib-count" id="cardsCount"></span>
    </div>
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-chip" onclick="setFilter('again',this)">❌ 再練習</button>
      <button class="filter-chip" onclick="setFilter('good',this)">✅ 掌握</button>
      <button class="filter-chip" onclick="shuffleVocab(this)">🔀 隨機</button>
    </div>
    <div id="cardArea"></div>
  </div>

  <!-- ── 填空 ── -->
  <div class="section" id="sec-fill">
    <div class="page-title">✏️ 填空練習</div>
    <div id="fillArea"></div>
  </div>

  <!-- ── 發音 ── -->
  <div class="section" id="sec-pron">
    <div class="page-title">🔊 發音對照</div>
    <div id="pronArea"></div>
  </div>

  <!-- ── 文法 ── -->
  <div class="section" id="sec-grammar">
    <div class="page-title">📝 文法筆記</div>
    <div id="grammarArea"></div>
  </div>

  <!-- ── Quiz ── -->
  <div class="section" id="sec-quiz">
    <div class="page-title">🧪 Quiz 測驗</div>
    <div id="quizArea"></div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="nav('scan',this)">
    <span class="nav-icon">📸</span><span class="nav-label">掃描</span>
  </button>
  <button class="nav-item" onclick="nav('cards',this)">
    <span class="nav-icon">🃏</span><span class="nav-label">單字卡</span>
  </button>
  <button class="nav-item" onclick="nav('fill',this)">
    <span class="nav-icon">✏️</span><span class="nav-label">填空</span>
  </button>
  <button class="nav-item" onclick="nav('pron',this)">
    <span class="nav-icon">🔊</span><span class="nav-label">發音</span>
  </button>
  <button class="nav-item" onclick="nav('grammar',this)">
    <span class="nav-icon">📝</span><span class="nav-label">文法</span>
  </button>
  <button class="nav-item" onclick="nav('quiz',this)">
    <span class="nav-icon">🧪</span><span class="nav-label">Quiz</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function load(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }

// ── STATE (loaded from localStorage) ──
let vocab = load('vocab', []);       // {kr, reading, zh, status}
let grammar = load('grammar', []);   // {title, kr, pattern, examples}
let sentences = load('sentences', []); // {kr, zh}
let imageBase64 = null;
let filteredVocab = [...vocab];
let cardIdx = 0;
let quizQs = [], quizIdx = 0, quizScore = 0;

// ── NAV ──
function nav(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'cards') { filteredVocab = [...vocab]; cardIdx = 0; renderCard(); }
  if (name === 'fill') renderFill();
  if (name === 'pron') renderPron();
  if (name === 'grammar') renderGrammar();
  if (name === 'quiz') startQuiz();
  updateBadge();
}

function updateBadge() {
  document.getElementById('totalBadge').textContent = vocab.length + ' 個單字';
}
updateBadge();

// ── FILE ──
function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result.split(',')[1];
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewArea').style.display = 'block';
    document.getElementById('resultBox').classList.remove('show');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ── API ──
function getKey() { return localStorage.getItem('geminiKey') || ''; }
function showApiSettings() {
  const cur = getKey();
  const k = prompt('Gemini API Key\n免費取得：aistudio.google.com → Get API Key', cur ? '（已設定，輸入新的換掉）' : '');
  if (k && k.trim() && k !== '（已設定，輸入新的換掉）') {
    localStorage.setItem('geminiKey', k.trim());
    toast('✅ API Key 已儲存');
  }
}

// ── ANALYZE ──
async function callGeminiWithRetry(key, imgBase64, prompt) {
  const maxRetries = 2; // only retries 503 (server temporarily busy)
  let lastErr;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    if (attempt > 0) {
      const loadP = document.querySelector('#loadingDiv p');
      if (loadP) loadP.textContent = `伺服器忙碌中，重試第 ${attempt} 次……`;
      await new Promise(r => setTimeout(r, 1500 * attempt));
    }
    let res;
    try {
      res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [
              { inline_data: { mime_type: 'image/jpeg', data: imgBase64 } },
              { text: prompt }
            ]}],
            generationConfig: { temperature: 0.1 }
          })
        }
      );
    } catch (networkErr) {
      lastErr = new Error(networkErr.message);
      lastErr.friendlyMessage = '⚠️ 網路連線失敗，請檢查網路後再試';
      continue; // network hiccup, worth retrying
    }

    if (res.status === 429) {
      const e = new Error('quota exceeded');
      e.friendlyMessage = '⏳ 今日 AI 額度已用完，請稍後再試（免費額度通常隔天重置）';
      throw e; // no point retrying, quota won't come back within seconds
    }
    if (res.status === 503) {
      lastErr = new Error('service unavailable');
      lastErr.friendlyMessage = '⚠️ Google 伺服器暫時忙碌，請稍後再試';
      continue; // retry
    }

    const data = await res.json();
    if (data.error) {
      const e = new Error(data.error.message);
      e.friendlyMessage = '⚠️ ' + data.error.message;
      throw e;
    }
    return data; // success
  }
  throw lastErr;
}

async function analyze() {
  const key = getKey();
  if (!key) {
    if (confirm('需要設定 Gemini API Key。\n前往設定？')) showApiSettings();
    return;
  }
  if (!imageBase64) return;
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loadingDiv').classList.add('show');
  const loadP0 = document.querySelector('#loadingDiv p');
  if (loadP0) loadP0.textContent = 'AI 正在識別書頁內容……';
  document.getElementById('resultBox').classList.remove('show');

  const prompt = `你是韓語教學助手。分析這張韓語書頁圖片，提取所有學習內容。每個翻譯都同時提供繁體中文(zh)與英文(en)。
嚴格以JSON回應，不要markdown：
{"vocab":[{"kr":"韓文","reading":"羅馬拼音","zh":"中文翻譯","en":"English translation"}],"grammar":[{"title":"文法名稱","kr":"韓文形式","pattern":"說明","examples":[{"kr":"例句","zh":"中文翻譯","en":"English translation"}]}],"sentences":[{"kr":"句子","zh":"中文翻譯","en":"English translation"}],"notes":"文法備注"}`;

  try {
    const data = await callGeminiWithRetry(key, imageBase64, prompt);
    const text = data.candidates[0].content.parts[0].text;
    const clean = text.replace(/```json|```/g,'').trim();
    renderResult(JSON.parse(clean));
  } catch(err) {
    toast(err.friendlyMessage || ('⚠️ ' + err.message));
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('loadingDiv').classList.remove('show');
  }
}

// pending data from scan
let _pVocab = [], _pGrammar = [], _pSentences = [];

function renderResult(d) {
  _pVocab = d.vocab || [];
  _pGrammar = d.grammar || [];
  _pSentences = d.sentences || [];

  // vocab
  const rv = document.getElementById('resVocab');
  const rb = document.getElementById('resVocabBody');
  if (_pVocab.length) {
    rb.innerHTML = _pVocab.map(v => `
      <div class="vrow">
        <div class="vrow-kr">${v.kr}</div>
        <div class="vrow-rom">${v.reading||''}</div>
        <div style="flex:1">
          <div class="vrow-zh">${v.zh}</div>
          ${v.en?`<div class="vrow-en">${v.en}</div>`:''}
        </div>
        <button class="tts-btn" onclick="speak('${esc(v.kr)}')">🔊</button>
      </div>`).join('');
    rv.style.display = 'block';
  } else rv.style.display = 'none';

  // notes
  const rn = document.getElementById('resNotes');
  if (d.notes && d.notes.trim()) {
    document.getElementById('resNotesBody').textContent = d.notes;
    rn.style.display = 'block';
  } else rn.style.display = 'none';

  // sentences
  const rs = document.getElementById('resSentences');
  const rsb = document.getElementById('resSentBody');
  if (_pSentences.length) {
    rsb.innerHTML = _pSentences.map(s => `
      <div class="vrow">
        <div style="flex:1">
          <div style="font-family:'Noto Sans KR';font-size:20px;font-weight:600;margin-bottom:4px">${s.kr}</div>
          <div style="font-size:16px;color:var(--text2)">${s.zh}</div>
          ${s.en?`<div class="vrow-en">${s.en}</div>`:''}
        </div>
        <button class="tts-btn" onclick="speak('${esc(s.kr)}')">🔊</button>
      </div>`).join('');
    rs.style.display = 'block';
  } else rs.style.display = 'none';

  document.getElementById('resultBox').classList.add('show');
}

function saveAll() {
  let added = 0;
  _pVocab.forEach(v => {
    if (!vocab.find(x => x.kr === v.kr)) { vocab.push({...v, status:'new'}); added++; }
  });
  _pGrammar.forEach(g => {
    if (!grammar.find(x => x.title === g.title)) grammar.push(g);
  });
  _pSentences.forEach(s => {
    if (!sentences.find(x => x.kr === s.kr)) sentences.push(s);
  });
  save('vocab', vocab);
  save('grammar', grammar);
  save('sentences', sentences);
  toast(`✅ 新增 ${added} 個單字，共 ${vocab.length} 個`);
  updateBadge();
}

// ── FLASHCARDS ──
function setFilter(f, btn) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filteredVocab = f === 'all' ? [...vocab] : vocab.filter(v => v.status === f);
  cardIdx = 0; renderCard();
}
function shuffleVocab(btn) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filteredVocab = [...vocab].sort(() => Math.random()-0.5);
  cardIdx = 0; renderCard();
}

function renderCard() {
  const area = document.getElementById('cardArea');
  const cnt = document.getElementById('cardsCount');
  if (!vocab.length) {
    area.innerHTML = emptyState('🃏','還沒有單字卡','先用掃描功能上傳書頁');
    cnt.textContent = ''; return;
  }
  if (!filteredVocab.length) {
    area.innerHTML = emptyState('🎉','這個分類沒有單字','');
    cnt.textContent = ''; return;
  }
  cnt.textContent = `${cardIdx+1} / ${filteredVocab.length}`;
  const v = filteredVocab[cardIdx];
  area.innerHTML = `
    <div class="card-counter">${cardIdx+1} / ${filteredVocab.length}</div>
    <div class="card-scene" onclick="flipCard(this)">
      <div class="card-inner">
        <div class="card-face front">
          <div class="card-label">韓文</div>
          <div class="card-kr">${v.kr}</div>
          <div class="card-rom">${v.reading||''}</div>
          <div class="card-tap">點擊翻面</div>
        </div>
        <div class="card-face back">
          <div class="card-label">中文 / English</div>
          <div class="card-zh">${v.zh}</div>
          ${v.en?`<div class="card-en">${v.en}</div>`:''}
          <div class="card-kr" style="font-size:36px">${v.kr}</div>
          <div class="card-rom">${v.reading||''}</div>
        </div>
      </div>
    </div>
    <div class="card-btns">
      <button class="card-btn again" onclick="markCard('again')">❌ 再練</button>
      <button class="card-btn speak" onclick="speak('${esc(v.kr)}')">🔊 發音</button>
      <button class="card-btn good" onclick="markCard('good')">✅ 掌握</button>
    </div>`;
}

function flipCard(el) { el.querySelector('.card-inner').classList.toggle('flipped'); }

function markCard(status) {
  if (!filteredVocab.length) return;
  const v = filteredVocab[cardIdx];
  const orig = vocab.find(x => x.kr === v.kr);
  if (orig) { orig.status = status; save('vocab', vocab); }
  cardIdx = (cardIdx+1) % filteredVocab.length;
  renderCard();
}

// ── FILL ──
function renderFill() {
  const area = document.getElementById('fillArea');
  const items = [...sentences];
  vocab.forEach(v => items.push({
    kr: `${v.kr}의 뜻은 "${v.zh}"입니다`,
    zh: `「${v.kr}」的意思是「${v.zh}」`,
    en: v.en ? `"${v.kr}" means "${v.en}"` : ''
  }));
  if (!items.length) { area.innerHTML = emptyState('✏️','還沒有練習題','先用掃描功能上傳書頁'); return; }
  const picked = items.sort(()=>Math.random()-0.5).slice(0, Math.min(15, items.length));
  area.innerHTML = picked.map((s,i) => {
    const words = s.kr.split(/\s+/);
    const bi = Math.floor(Math.random() * words.length);
    const ans = words[bi];
    const display = words.map((w,wi) => wi===bi
      ? `<input class="fill-input" id="fi${i}" data-ans="${esc(ans)}" placeholder="？">`
      : w).join(' ');
    return `<div class="fill-card">
      <div class="fill-q">${display}</div>
      <div class="fill-hint">${s.zh}</div>
      ${s.en?`<div class="fill-hint-en">${s.en}</div>`:''}
      <div class="fill-reveal" id="fr${i}">✅ 正確答案：<strong>${ans}</strong></div>
      <button class="confirm-btn" onclick="checkFill(${i})">確認</button>
    </div>`;
  }).join('');
}

function checkFill(i) {
  const inp = document.getElementById('fi'+i);
  const ans = inp.dataset.ans;
  inp.classList.remove('correct','wrong');
  if (inp.value.trim() === ans) { inp.classList.add('correct'); toast('🎉 正確！'); }
  else { inp.classList.add('wrong'); document.getElementById('fr'+i).classList.add('show'); toast('❌ 再試試看'); }
}

// ── PRON ──
function renderPron() {
  const area = document.getElementById('pronArea');
  if (!vocab.length) { area.innerHTML = emptyState('🔊','還沒有單字','先用掃描功能上傳書頁'); return; }
  area.innerHTML = vocab.map(v => `
    <div class="pron-card">
      <div class="pron-kr">${v.kr}</div>
      <div class="pron-info">
        <div class="pron-rom">${v.reading||''}</div>
        <div class="pron-zh">${v.zh}</div>
        ${v.en?`<div class="pron-en">${v.en}</div>`:''}
      </div>
      <button class="pron-play" onclick="speak('${esc(v.kr)}')">▶</button>
    </div>`).join('');
}

// ── GRAMMAR ──
function renderGrammar() {
  const area = document.getElementById('grammarArea');
  if (!grammar.length) { area.innerHTML = emptyState('📝','還沒有文法筆記','先用掃描功能上傳書頁'); return; }
  area.innerHTML = grammar.map((g,i) => `
    <div class="grammar-card">
      <div class="grammar-hdr" onclick="toggleG(${i})">
        <div class="grammar-hdr-text">
          <div class="grammar-name">${g.title||''}</div>
          <div class="grammar-kr-form">${g.kr||''}</div>
        </div>
        <span id="ga${i}">▼</span>
      </div>
      <div class="grammar-body" id="gb${i}">
        ${g.pattern?`<div class="grammar-pattern">${g.pattern}</div>`:''}
        ${g.examples?.length?`<ul class="grammar-ex">${g.examples.map(ex=>`
          <li>
            <div class="grammar-ex-kr">${ex.kr} <button class="tts-btn" onclick="speak('${esc(ex.kr)}')">🔊</button></div>
            <div class="grammar-ex-zh">${ex.zh}</div>
            ${ex.en?`<div class="grammar-ex-en">${ex.en}</div>`:''}
          </li>`).join('')}</ul>`:''}
      </div>
    </div>`).join('');
}
function toggleG(i) {
  const b = document.getElementById('gb'+i);
  b.classList.toggle('open');
  document.getElementById('ga'+i).textContent = b.classList.contains('open') ? '▲' : '▼';
}

// ── QUIZ ──
function startQuiz() {
  const area = document.getElementById('quizArea');
  if (vocab.length < 4) { area.innerHTML = emptyState('🧪','需要至少 4 個單字','先用掃描功能上傳書頁'); return; }
  quizQs = [...vocab].sort(()=>Math.random()-0.5).slice(0,Math.min(10,vocab.length)).map(v => {
    const wrongs = vocab.filter(x=>x.kr!==v.kr).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.zh);
    return { v, opts: [v.zh,...wrongs].sort(()=>Math.random()-0.5), correct: v.zh };
  });
  quizIdx = 0; quizScore = 0; renderQuiz();
}

function renderQuiz() {
  const area = document.getElementById('quizArea');
  if (quizIdx >= quizQs.length) {
    const pct = Math.round(quizScore/quizQs.length*100);
    area.innerHTML = `<div class="score-card">
      <div class="score-num">${quizScore}/${quizQs.length}</div>
      <div class="score-label">正確率 ${pct}%</div>
      <button class="retry-btn" onclick="startQuiz()">🔄 再測一次</button>
    </div>`; return;
  }
  const q = quizQs[quizIdx];
  const pct = quizIdx/quizQs.length*100;
  area.innerHTML = `
    <div class="quiz-meta">
      <span>第 ${quizIdx+1} 題 / ${quizQs.length} 題</span>
      <span>✅ ${quizScore}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-word-card">
      <div class="quiz-prompt">這個韓文的意思是？</div>
      <div class="quiz-word">${q.v.kr}</div>
      ${q.v.reading?`<div class="quiz-rom">${q.v.reading}</div>`:''}
    </div>
    <div class="quiz-opts">
      ${q.opts.map(o=>`<button class="quiz-opt" onclick="answerQuiz('${esc(o)}','${esc(q.correct)}',this)">${o}</button>`).join('')}
    </div>`;
}

function answerQuiz(chosen, correct, btn) {
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  if (chosen === correct) { quizScore++; toast('🎉 正確！'); }
  else { btn.classList.add('wrong'); toast('❌ 答錯了'); }
  setTimeout(() => { quizIdx++; renderQuiz(); }, 1200);
}

// ── TTS ──
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.85;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

// ── UTILS ──
function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  const duration = msg.length > 20 ? 4200 : 2500;
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), duration);
}
function emptyState(icon, title, sub) {
  return `<div class="empty"><div class="eicon">${icon}</div><h3>${title}</h3><p>${sub}</p></div>`;
}
