<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>한공부 · 韓語學習</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D4522A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="한공부">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E8E5DF;
    --text-primary: #1A1916;
    --text-secondary: #6B6860;
    --text-muted: #A8A59E;
    --accent: #D4522A;
    --accent-soft: #FBF0EC;
    --accent2: #3A6EA5;
    --accent2-soft: #EBF1F8;
    --green: #2E7D5E;
    --green-soft: #E8F4EE;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
  }
  .logo {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span {
    color: var(--text-secondary);
    font-weight: 300;
    font-size: 13px;
    margin-left: 6px;
  }
  header nav {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .nav-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--bg); color: var(--text-primary); }
  .nav-btn.active { background: var(--accent); color: white; }

  /* ── MAIN ── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 100px;
  }

  /* ── SECTIONS ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── UPLOAD SECTION ── */
  .upload-hero {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-hero:hover { border-color: var(--accent); background: var(--accent-soft); }
  .upload-hero.dragover { border-color: var(--accent); background: var(--accent-soft); }
  .upload-icon { font-size: 48px; margin-bottom: 12px; }
  .upload-hero h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .upload-hero p { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
  .upload-hero input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-preview {
    margin-top: 20px;
    display: none;
  }
  .upload-preview.show { display: block; }
  .preview-img {
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  .process-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .process-btn:hover { opacity: 0.9; }
  .process-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── AI RESULT ── */
  .ai-result {
    margin-top: 20px;
    display: none;
  }
  .ai-result.show { display: block; }

  .result-section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .result-section-header {
    padding: 14px 18px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-section-body { padding: 16px 18px; }

  /* ── VOCAB ITEM (in result) ── */
  .vocab-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .vocab-row:last-child { border-bottom: none; }
  .vocab-kr { font-family: 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 500; min-width: 80px; }
  .vocab-reading { font-size: 13px; color: var(--text-secondary); min-width: 80px; }
  .vocab-zh { font-size: 14px; color: var(--text-primary); flex: 1; }
  .tts-btn {
    background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px;
    color: var(--text-muted); transition: color 0.15s;
  }
  .tts-btn:hover { color: var(--accent); }

  .save-all-btn {
    width: 100%;
    padding: 12px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-top: 16px;
  }

  /* ── CARDS SECTION ── */
  .cards-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .flashcard-area {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .flashcard-counter {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* 3D flip card */
  .card-scene {
    width: 100%;
    max-width: 420px;
    height: 220px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 20px;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    gap: 10px;
  }
  .card-face.back { transform: rotateY(180deg); background: var(--accent-soft); }
  .card-tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .card-kr {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .card-reading { font-size: 15px; color: var(--text-secondary); }
  .card-zh { font-size: 20px; font-weight: 500; color: var(--accent); }
  .card-hint { font-size: 12px; color: var(--text-muted); }

  .card-actions {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 420px;
  }
  .card-action-btn {
    flex: 1;
    padding: 11px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .card-action-btn.again { border-color: var(--accent); color: var(--accent); }
  .card-action-btn.again:hover { background: var(--accent); color: white; }
  .card-action-btn.good { border-color: var(--green); color: var(--green); }
  .card-action-btn.good:hover { background: var(--green); color: white; }
  .card-action-btn.speak { border-color: var(--accent2); color: var(--accent2); }
  .card-action-btn.speak:hover { background: var(--accent2); color: white; }

  /* ── FILL-IN ── */
  .fill-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .fill-q {
    font-size: 16px;
    line-height: 1.8;
    margin-bottom: 16px;
  }
  .fill-blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 2px solid var(--accent);
    padding: 2px 6px;
    font-size: 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    outline: none;
    text-align: center;
    color: var(--accent);
    background: transparent;
    vertical-align: middle;
  }
  .fill-blank.correct { border-color: var(--green); color: var(--green); }
  .fill-blank.wrong { border-color: #D32F2F; color: #D32F2F; }
  .fill-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .fill-answer-reveal {
    margin-top: 8px;
    font-size: 14px;
    color: var(--text-secondary);
    display: none;
  }
  .fill-answer-reveal.show { display: block; }
  .check-btn {
    padding: 8px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-top: 8px;
  }

  /* ── GRAMMAR ── */
  .grammar-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .grammar-header {
    padding: 16px 20px;
    background: var(--accent2-soft);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .grammar-title { font-size: 16px; font-weight: 700; flex: 1; }
  .grammar-kr { font-family: 'Noto Sans KR'; color: var(--accent2); font-size: 20px; }
  .grammar-body { padding: 18px 20px; display: none; }
  .grammar-body.open { display: block; }
  .grammar-pattern {
    font-family: 'Noto Sans KR', monospace;
    background: var(--bg);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    font-size: 15px;
    color: var(--accent2);
    font-weight: 500;
  }
  .grammar-examples { list-style: none; }
  .grammar-examples li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.7;
  }
  .grammar-examples li:last-child { border-bottom: none; }
  .grammar-examples .kr { font-family: 'Noto Sans KR'; font-size: 16px; }
  .grammar-examples .zh { color: var(--text-secondary); }

  /* ── QUIZ ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .quiz-progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .quiz-q {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 28px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .quiz-question-text {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .quiz-word {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 40px;
    font-weight: 700;
  }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .quiz-opt {
    padding: 14px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .quiz-opt.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); font-weight: 600; }
  .quiz-opt.wrong { background: #FFF0EE; border-color: #D32F2F; color: #D32F2F; }
  .quiz-opt:disabled { cursor: default; }
  .quiz-score {
    text-align: center;
    padding: 40px 24px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .quiz-score-num { font-size: 64px; font-weight: 700; color: var(--accent); }
  .quiz-score-label { font-size: 16px; color: var(--text-secondary); margin-top: 8px; }

  /* ── PRONUNCIATION ── */
  .pron-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow);
  }
  .pron-kr { font-family: 'Noto Sans KR'; font-size: 26px; font-weight: 700; min-width: 100px; }
  .pron-info { flex: 1; }
  .pron-reading { font-size: 14px; color: var(--text-secondary); }
  .pron-zh { font-size: 15px; color: var(--text-primary); }
  .pron-btns { display: flex; gap: 8px; }
  .pron-play-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--accent2);
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .pron-play-btn:hover { opacity: 0.85; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-state p { font-size: 14px; }

  /* ── LOADING ── */
  .loading {
    display: none;
    text-align: center;
    padding: 32px;
    color: var(--text-secondary);
  }
  .loading.show { display: block; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-primary);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  /* mobile tweaks */
  @media (max-width: 480px) {
    .card-kr { font-size: 28px; }
    .quiz-word { font-size: 32px; }
    .quiz-options { grid-template-columns: 1fr; }
    header nav { gap: 2px; }
    .nav-btn { padding: 5px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">한공부<span>韓語學習</span></div>
  <nav>
    <button class="nav-btn active" onclick="showSection('upload')">📸 掃描</button>
    <button class="nav-btn" onclick="showSection('cards')">🃏 單字卡</button>
    <button class="nav-btn" onclick="showSection('fill')">✏️ 填空</button>
    <button class="nav-btn" onclick="showSection('pron')">🔊 發音</button>
    <button class="nav-btn" onclick="showSection('grammar')">📝 文法</button>
    <button class="nav-btn" onclick="showSection('quiz')">🧪 Quiz</button>
  </nav>
</header>

<main>

  <!-- ─── UPLOAD ─── -->
  <div class="section active" id="section-upload">
    <div class="section-title">拍照上傳書頁</div>
    <div class="upload-hero" id="uploadArea">
      <div class="upload-icon">📖</div>
      <h2>上傳書頁照片</h2>
      <p>拍下你的韓語課本頁面<br>AI 會自動識別單字、文法和例句</p>
    </div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button onclick="document.getElementById('fileInputCamera').click()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">
        📷 拍照
      </button>
      <button onclick="document.getElementById('fileInputGallery').click()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:var(--surface);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">
        🖼️ 圖庫
      </button>
    </div>
    <input type="file" accept="image/*" capture="environment" id="fileInputCamera" onchange="handleFile(event)" style="position:absolute;left:-9999px;opacity:0;width:1px;height:1px">
    <input type="file" accept="image/*" id="fileInputGallery" onchange="handleFile(event)" style="position:absolute;left:-9999px;opacity:0;width:1px;height:1px">

    <div class="upload-preview" id="uploadPreview">
      <img id="previewImg" class="preview-img" alt="預覽">
      <button class="process-btn" id="processBtn" onclick="processImage()">🤖 分析書頁內容</button>
    </div>

    <div class="loading" id="loadingDiv">
      <div class="spinner"></div>
      <div>AI 正在識別書頁內容……</div>
    </div>

    <div class="ai-result" id="aiResult">
      <div class="result-section" id="vocabResult" style="display:none">
        <div class="result-section-header">📚 識別到的單字</div>
        <div class="result-section-body" id="vocabBody"></div>
      </div>
      <div class="result-section" id="grammarResult" style="display:none">
        <div class="result-section-header">📝 文法要點</div>
        <div class="result-section-body" id="grammarBody" style="white-space:pre-wrap;font-size:14px;line-height:1.8;color:var(--text-secondary)"></div>
      </div>
      <div class="result-section" id="exampleResult" style="display:none">
        <div class="result-section-header">💬 例句</div>
        <div class="result-section-body" id="exampleBody"></div>
      </div>
      <button class="save-all-btn" onclick="saveAll()">✅ 儲存到我的學習庫</button>
    </div>
  </div>

  <!-- ─── CARDS ─── -->
  <div class="section" id="section-cards">
    <div class="section-title">單字卡</div>
    <div class="cards-controls">
      <button class="filter-btn active" onclick="filterCards('all',this)">全部</button>
      <button class="filter-btn" onclick="filterCards('again',this)">❌ 再練習</button>
      <button class="filter-btn" onclick="filterCards('good',this)">✅ 已掌握</button>
      <button class="filter-btn" onclick="shuffleCards(this)">🔀 隨機</button>
    </div>
    <div class="flashcard-area" id="flashcardArea">
      <div class="empty-state">
        <div class="icon">🃏</div>
        <h3>還沒有單字卡</h3>
        <p>先用「掃描」功能上傳書頁</p>
      </div>
    </div>
  </div>

  <!-- ─── FILL ─── -->
  <div class="section" id="section-fill">
    <div class="section-title">填空練習</div>
    <div id="fillArea">
      <div class="empty-state">
        <div class="icon">✏️</div>
        <h3>還沒有練習題</h3>
        <p>先用「掃描」功能上傳書頁</p>
      </div>
    </div>
  </div>

  <!-- ─── PRONUNCIATION ─── -->
  <div class="section" id="section-pron">
    <div class="section-title">發音對照</div>
    <div id="pronArea">
      <div class="empty-state">
        <div class="icon">🔊</div>
        <h3>還沒有單字</h3>
        <p>先用「掃描」功能上傳書頁</p>
      </div>
    </div>
  </div>

  <!-- ─── GRAMMAR ─── -->
  <div class="section" id="section-grammar">
    <div class="section-title">文法筆記</div>
    <div id="grammarArea">
      <div class="empty-state">
        <div class="icon">📝</div>
        <h3>還沒有文法筆記</h3>
        <p>先用「掃描」功能上傳書頁</p>
      </div>
    </div>
  </div>

  <!-- ─── QUIZ ─── -->
  <div class="section" id="section-quiz">
    <div id="quizArea">
      <div class="empty-state">
        <div class="icon">🧪</div>
        <h3>還沒有測驗題目</h3>
        <p>先用「掃描」功能上傳書頁</p>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let vocab = []; // {kr, reading, zh, status:'new'|'again'|'good'}
let grammarNotes = []; // {title, kr, pattern, examples:[{kr,zh}]}
let sentences = []; // {kr, zh} for fill-in
let currentCardIdx = 0;
let filteredVocab = [];
let quizQ = [];
let quizIdx = 0;
let quizScore = 0;
let imageBase64 = null;

// ── NAV ──
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  event.target.classList.add('active');

  if (name === 'cards') renderCards();
  if (name === 'fill') renderFill();
  if (name === 'pron') renderPron();
  if (name === 'grammar') renderGrammar();
  if (name === 'quiz') initQuiz();
}

// ── FILE HANDLING ──
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    const dataUrl = evt.target.result;
    imageBase64 = dataUrl.split(',')[1];
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('uploadPreview').classList.add('show');
    document.getElementById('aiResult').classList.remove('show');
  };
  reader.readAsDataURL(file);
}

// drag & drop
const ua = document.getElementById('uploadArea');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.classList.add('dragover'); });
ua.addEventListener('dragleave', () => ua.classList.remove('dragover'));
ua.addEventListener('drop', e => {
  e.preventDefault(); ua.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => {
      imageBase64 = ev.target.result.split(',')[1];
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('uploadPreview').classList.add('show');
    };
    reader.readAsDataURL(file);
  }
});

// ── PROCESS IMAGE ──
async function processImage() {
  if (!imageBase64) return;
  document.getElementById('processBtn').disabled = true;
  document.getElementById('loadingDiv').classList.add('show');
  document.getElementById('aiResult').classList.remove('show');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 }
            },
            {
              type: 'text',
              text: `你是一個韓語教學助手。請仔細分析這張韓語學習書頁的圖片，提取所有學習內容。

請嚴格以以下JSON格式回應，不要有任何markdown或額外文字：
{
  "vocab": [
    {"kr": "韓文單字", "reading": "romanization或注音", "zh": "中文翻譯"}
  ],
  "grammar": [
    {
      "title": "文法名稱（中文）",
      "kr": "韓文文法形式",
      "pattern": "使用方式說明",
      "examples": [
        {"kr": "韓文例句", "zh": "中文翻譯"}
      ]
    }
  ],
  "sentences": [
    {"kr": "完整韓文句子", "zh": "中文翻譯"}
  ],
  "notes": "其他重要文法說明（純文字）"
}

如果圖片中沒有某類內容，給空陣列。vocab 至少嘗試提取所有出現的韓文單字。`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text;
    let parsed;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      throw new Error('無法解析AI回應');
    }

    renderUploadResult(parsed);

  } catch(err) {
    showToast('⚠️ 分析失敗：' + err.message);
  } finally {
    document.getElementById('processBtn').disabled = false;
    document.getElementById('loadingDiv').classList.remove('show');
  }
}

function renderUploadResult(data) {
  // VOCAB
  const vr = document.getElementById('vocabResult');
  const vb = document.getElementById('vocabBody');
  if (data.vocab && data.vocab.length > 0) {
    vb.innerHTML = data.vocab.map((v,i) => `
      <div class="vocab-row">
        <div class="vocab-kr">${v.kr}</div>
        <div class="vocab-reading">${v.reading||''}</div>
        <div class="vocab-zh">${v.zh}</div>
        <button class="tts-btn" onclick="speak('${v.kr.replace(/'/g,"\\'")}')">🔊</button>
      </div>
    `).join('');
    vr.style.display = 'block';
    window._pendingVocab = data.vocab;
  } else {
    vr.style.display = 'none';
    window._pendingVocab = [];
  }

  // GRAMMAR
  const gr = document.getElementById('grammarResult');
  const gb = document.getElementById('grammarBody');
  if (data.notes && data.notes.trim()) {
    gb.textContent = data.notes;
    gr.style.display = 'block';
  } else {
    gr.style.display = 'none';
  }
  window._pendingGrammar = data.grammar || [];

  // EXAMPLES
  const er = document.getElementById('exampleResult');
  const eb = document.getElementById('exampleBody');
  if (data.sentences && data.sentences.length > 0) {
    eb.innerHTML = data.sentences.map(s => `
      <div class="vocab-row">
        <div style="flex:1">
          <div class="vocab-kr" style="font-size:15px">${s.kr}</div>
          <div class="vocab-zh">${s.zh}</div>
        </div>
        <button class="tts-btn" onclick="speak('${s.kr.replace(/'/g,"\\'")}')">🔊</button>
      </div>
    `).join('');
    er.style.display = 'block';
    window._pendingSentences = data.sentences;
  } else {
    er.style.display = 'none';
    window._pendingSentences = [];
  }

  document.getElementById('aiResult').classList.add('show');
}

function saveAll() {
  const pv = window._pendingVocab || [];
  const pg = window._pendingGrammar || [];
  const ps = window._pendingSentences || [];

  pv.forEach(v => {
    if (!vocab.find(x => x.kr === v.kr)) {
      vocab.push({ ...v, status: 'new' });
    }
  });
  pg.forEach(g => {
    if (!grammarNotes.find(x => x.title === g.title)) {
      grammarNotes.push(g);
    }
  });
  ps.forEach(s => {
    if (!sentences.find(x => x.kr === s.kr)) {
      sentences.push(s);
    }
  });

  showToast(`✅ 已儲存 ${pv.length} 個單字、${pg.length} 條文法、${ps.length} 個例句`);
}

// ── FLASHCARDS ──
function filterCards(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (filter === 'all') filteredVocab = [...vocab];
  else filteredVocab = vocab.filter(v => v.status === filter);
  currentCardIdx = 0;
  renderCards();
}

function shuffleCards(btn) {
  filteredVocab = [...vocab].sort(() => Math.random() - 0.5);
  currentCardIdx = 0;
  renderCards();
}

function renderCards() {
  if (filteredVocab.length === 0) filteredVocab = [...vocab];
  const area = document.getElementById('flashcardArea');
  if (vocab.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🃏</div><h3>還沒有單字卡</h3><p>先用「掃描」功能上傳書頁</p></div>`;
    return;
  }
  if (filteredVocab.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><h3>這個分類沒有單字</h3></div>`;
    return;
  }
  const v = filteredVocab[currentCardIdx];
  area.innerHTML = `
    <div class="flashcard-counter">${currentCardIdx + 1} / ${filteredVocab.length}</div>
    <div class="card-scene" onclick="flipCard(this)">
      <div class="card-inner" id="cardInner">
        <div class="card-face front">
          <div class="card-tag">韓文</div>
          <div class="card-kr">${v.kr}</div>
          <div class="card-reading">${v.reading||''}</div>
          <div class="card-hint">點擊翻面</div>
        </div>
        <div class="card-face back">
          <div class="card-tag">中文</div>
          <div class="card-zh">${v.zh}</div>
          <div class="card-kr" style="font-size:22px">${v.kr}</div>
          <div class="card-reading">${v.reading||''}</div>
        </div>
      </div>
    </div>
    <div class="card-actions">
      <button class="card-action-btn again" onclick="markCard('again')">❌ 再練習</button>
      <button class="card-action-btn speak" onclick="speak('${v.kr.replace(/'/g,"\\'")}')">🔊 發音</button>
      <button class="card-action-btn good" onclick="markCard('good')">✅ 掌握了</button>
    </div>
  `;
}

function flipCard(el) {
  el.querySelector('.card-inner').classList.toggle('flipped');
}

function markCard(status) {
  if (filteredVocab.length === 0) return;
  const v = filteredVocab[currentCardIdx];
  const orig = vocab.find(x => x.kr === v.kr);
  if (orig) orig.status = status;
  currentCardIdx = (currentCardIdx + 1) % filteredVocab.length;
  renderCards();
}

// ── FILL-IN ──
function renderFill() {
  const area = document.getElementById('fillArea');
  const items = [...sentences, ...vocab.map(v => ({ kr: `${v.kr}의 뜻은 「${v.zh}」입니다`, zh: `${v.kr} 的意思是「${v.zh}」` }))];
  if (items.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">✏️</div><h3>還沒有練習題</h3><p>先用「掃描」功能上傳書頁</p></div>`;
    return;
  }
  area.innerHTML = items.map((s, i) => {
    // blank out a random Korean word in the sentence
    const words = s.kr.split(/\s+/);
    const blankIdx = Math.floor(Math.random() * words.length);
    const answer = words[blankIdx];
    const display = words.map((w, wi) =>
      wi === blankIdx
        ? `<input class="fill-blank" id="fill-${i}" data-answer="${answer}" placeholder="?" oninput="autoCheck(${i})">`
        : w
    ).join(' ');
    return `
      <div class="fill-card">
        <div class="fill-q">${display}</div>
        <div class="fill-hint">${s.zh}</div>
        <div class="fill-answer-reveal" id="reveal-${i}">正確答案：<strong>${answer}</strong></div>
        <button class="check-btn" onclick="checkFill(${i})">確認</button>
      </div>
    `;
  }).join('');
}

function autoCheck(i) {
  const input = document.getElementById('fill-' + i);
  input.classList.remove('correct', 'wrong');
}

function checkFill(i) {
  const input = document.getElementById('fill-' + i);
  const answer = input.dataset.answer;
  const val = input.value.trim();
  const reveal = document.getElementById('reveal-' + i);
  if (val === answer) {
    input.classList.add('correct');
    input.classList.remove('wrong');
    showToast('🎉 正確！');
  } else {
    input.classList.add('wrong');
    input.classList.remove('correct');
    reveal.classList.add('show');
    showToast('❌ 再試試看');
  }
}

// ── PRONUNCIATION ──
function renderPron() {
  const area = document.getElementById('pronArea');
  if (vocab.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🔊</div><h3>還沒有單字</h3><p>先用「掃描」功能上傳書頁</p></div>`;
    return;
  }
  area.innerHTML = vocab.map(v => `
    <div class="pron-card">
      <div class="pron-kr">${v.kr}</div>
      <div class="pron-info">
        <div class="pron-reading">${v.reading||''}</div>
        <div class="pron-zh">${v.zh}</div>
      </div>
      <div class="pron-btns">
        <button class="pron-play-btn" onclick="speak('${v.kr.replace(/'/g,"\\'")}')">▶</button>
      </div>
    </div>
  `).join('');
}

// ── GRAMMAR ──
function renderGrammar() {
  const area = document.getElementById('grammarArea');
  if (grammarNotes.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">📝</div><h3>還沒有文法筆記</h3><p>先用「掃描」功能上傳書頁</p></div>`;
    return;
  }
  area.innerHTML = grammarNotes.map((g, i) => `
    <div class="grammar-card">
      <div class="grammar-header" onclick="toggleGrammar(${i})">
        <div>
          <div class="grammar-title">${g.title||''}</div>
          <div class="grammar-kr">${g.kr||''}</div>
        </div>
        <span id="garrow-${i}">▼</span>
      </div>
      <div class="grammar-body" id="gbody-${i}">
        ${g.pattern ? `<div class="grammar-pattern">${g.pattern}</div>` : ''}
        ${g.examples && g.examples.length ? `
          <ul class="grammar-examples">
            ${g.examples.map(ex => `
              <li>
                <div class="kr">${ex.kr} <button class="tts-btn" onclick="speak('${ex.kr.replace(/'/g,"\\'")}')">🔊</button></div>
                <div class="zh">${ex.zh}</div>
              </li>
            `).join('')}
          </ul>
        ` : ''}
      </div>
    </div>
  `).join('');
}

function toggleGrammar(i) {
  const body = document.getElementById('gbody-' + i);
  const arrow = document.getElementById('garrow-' + i);
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}

// ── QUIZ ──
function initQuiz() {
  const area = document.getElementById('quizArea');
  if (vocab.length < 2) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🧪</div><h3>需要至少 2 個單字才能測驗</h3><p>先用「掃描」功能上傳書頁</p></div>`;
    return;
  }
  quizQ = generateQuizQuestions();
  quizIdx = 0;
  quizScore = 0;
  renderQuizQ();
}

function generateQuizQuestions() {
  const shuffled = [...vocab].sort(() => Math.random() - 0.5).slice(0, Math.min(10, vocab.length));
  return shuffled.map(v => {
    const wrongs = vocab.filter(x => x.kr !== v.kr).sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.zh);
    const opts = [v.zh, ...wrongs].sort(() => Math.random() - 0.5);
    return { v, opts, correct: v.zh };
  });
}

function renderQuizQ() {
  const area = document.getElementById('quizArea');
  if (quizIdx >= quizQ.length) {
    const pct = Math.round(quizScore / quizQ.length * 100);
    area.innerHTML = `
      <div class="quiz-score">
        <div class="quiz-score-num">${quizScore}/${quizQ.length}</div>
        <div class="quiz-score-label">正確率 ${pct}%</div>
        <br>
        <button class="check-btn" onclick="initQuiz()">🔄 再測一次</button>
      </div>`;
    return;
  }
  const q = quizQ[quizIdx];
  const progress = (quizIdx / quizQ.length) * 100;
  area.innerHTML = `
    <div class="quiz-header">
      <div style="font-size:14px;color:var(--text-secondary)">第 ${quizIdx+1} 題 / 共 ${quizQ.length} 題</div>
      <div style="font-size:14px;color:var(--text-secondary)">✅ ${quizScore}</div>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
    <div class="quiz-q">
      <div class="quiz-question-text">這個韓文的意思是？</div>
      <div class="quiz-word">${q.v.kr}</div>
      ${q.v.reading ? `<div style="font-size:14px;color:var(--text-muted);margin-top:6px">${q.v.reading}</div>` : ''}
    </div>
    <div class="quiz-options">
      ${q.opts.map(opt => `
        <button class="quiz-opt" onclick="answerQuiz('${opt.replace(/'/g,"\\'")}', '${q.correct.replace(/'/g,"\\'")}', this)">${opt}</button>
      `).join('')}
    </div>
  `;
}

function answerQuiz(chosen, correct, btn) {
  const btns = document.querySelectorAll('.quiz-opt');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    showToast('🎉 正確！');
  } else {
    btn.classList.add('wrong');
    showToast('❌ 答錯了');
  }
  setTimeout(() => {
    quizIdx++;
    renderQuizQ();
  }, 1200);
}

// ── TTS ──
function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR';
  utter.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// init
filteredVocab = [...vocab];
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
